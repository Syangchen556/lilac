<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - Lilac</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css"> <!-- External CSS -->
</head>
<div class="chat-container">
    <!-- Sidebar (Initially Hidden) -->
    <div class="sidebar" id="sidebar">
        <h2>Lilac</h2>
        <ul class="list-unstyled">
            <li>Home</li>
            <li>Settings</li>
            <li>Help</li>
        </ul>
    </div>

    <!-- Chat Box -->
    <div class="chatbox" id="chatBox">
        <div class="chat-header">
            <!-- Sidebar Toggle Button (On the Left) -->
            <button class="btn btn-light" onclick="toggleSidebar()">☰</button>

            <span class="chat-title">Lilac - AI Chatbot</span>

            <!-- Profile Picture with Dropdown Menu (Top Right Corner) -->
            <div class="dropdown profile-menu">
                <img src="assets/profile.png" class="profile-pic dropdown-toggle" id="profileMenuButton" alt="Profile" data-bs-toggle="dropdown" aria-expanded="false">
                <ul class="dropdown-menu" aria-labelledby="profileMenuButton">
                    <li><a class="dropdown-item" href="#">Sign Up</a></li>
                    <li><a class="dropdown-item" href="#">Login</a></li>
                    <li><a class="dropdown-item" href="#">Sign Out</a></li>
                </ul>
            </div>
        </div>

        <div class="chat-output" id="chatOutput">
            <!-- AI Avatar in the center of the chat -->
            <div class="ai-avatar">
                <img src="assets/ai-avatar.png" alt="AI Avatar">
            </div>

            <!-- Messages will be appended here -->
        </div>

        <!-- Chat Input -->
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>


    <script src="script.js"></script> <!-- External JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
